<!--
  PATCH: adicionar avaliações na página pública do cliente (pagina-cliente.html)

  Adicione este bloco HTML logo antes do </body> da página pública.
  Ele busca as avaliações do prestador via API pública e exibe na página.
-->

<!-- ── AVALIAÇÕES ── -->
<div class="content" id="secao-avaliacoes" style="display:none">
  <div class="section-title">O que dizem os clientes</div>

  <!-- Resumo com média -->
  <div style="display:flex;align-items:center;gap:16px;background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px">
    <div style="text-align:center;flex-shrink:0">
      <div style="font-family:'Instrument Serif',serif;font-size:48px;font-weight:300;color:var(--ink);line-height:1" id="av-media">—</div>
      <div style="font-size:20px;letter-spacing:2px;margin:4px 0" id="av-estrelas"></div>
      <div style="font-size:12px;color:var(--muted)" id="av-total"></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;gap:5px" id="av-barras"></div>
  </div>

  <!-- Lista de avaliações -->
  <div id="av-lista" style="display:flex;flex-direction:column;gap:10px"></div>

  <!-- Ver mais -->
  <button id="btn-ver-mais" style="display:none;width:100%;margin-top:12px;background:none;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:14px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif" onclick="verMaisAvaliacoes()">
    Ver mais avaliações
  </button>
</div>

<style>
  .av-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .av-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .av-autor {
    font-size: 13px;
    font-weight: 500;
  }
  .av-data {
    font-size: 11px;
    color: var(--faint);
  }
  .av-estrelas-row {
    font-size: 14px;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .av-texto {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    font-style: italic;
  }
</style>

<script>
// ── CARREGA AVALIAÇÕES ────────────────────────────────────────────────────
// Este script é adicionado ao bloco <script> existente na página pública.
// Ele roda junto com o código já existente.

const SUPABASE_URL_AV = 'https://SEU_PROJETO.supabase.co'; // substituir

let todasAvaliacoes = [];
let exibindo        = 3;

async function carregarAvaliacoes(slug) {
  try {
    const res = await fetch(
      `${SUPABASE_URL_AV}/functions/v1/avaliacoes?prestador_slug=${slug}`
    );
    if (!res.ok) return;

    const { media, total, avaliacoes } = await res.json();

    if (!total) return; // sem avaliações, não exibe a seção

    todasAvaliacoes = avaliacoes;

    // Média
    document.getElementById('av-media').textContent   = media.toFixed(1);
    document.getElementById('av-estrelas').textContent = '⭐'.repeat(Math.round(media));
    document.getElementById('av-total').textContent   = `${total} avaliação${total !== 1 ? 'ões' : ''}`;

    // Barras de distribuição
    const contagem = [5,4,3,2,1].map(n => ({
      n,
      qtd: avaliacoes.filter(a => a.nota === n).length,
    }));
    const max = Math.max(...contagem.map(c => c.qtd), 1);
    document.getElementById('av-barras').innerHTML = contagem.map(c => `
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)">
        <span style="width:14px;text-align:right">${c.n}</span>
        <span>⭐</span>
        <div style="flex:1;background:var(--bg2);height:6px;border-radius:3px;overflow:hidden">
          <div style="width:${(c.qtd/max)*100}%;height:100%;background:#F5A623;border-radius:3px"></div>
        </div>
        <span style="width:18px">${c.qtd}</span>
      </div>
    `).join('');

    // Cards de avaliações
    renderAvaliacoes();

    document.getElementById('secao-avaliacoes').style.display = 'block';

    if (total > 3) {
      document.getElementById('btn-ver-mais').style.display = 'block';
    }
  } catch (e) {
    console.error('Erro ao carregar avaliações:', e);
  }
}

function renderAvaliacoes() {
  const lista = todasAvaliacoes.slice(0, exibindo);
  document.getElementById('av-lista').innerHTML = lista.map(av => `
    <div class="av-card">
      <div class="av-header">
        <span class="av-autor">${av.cliente_nome}</span>
        <span class="av-data">${new Date(av.created_at).toLocaleDateString('pt-BR')}</span>
      </div>
      <div class="av-estrelas-row">${'⭐'.repeat(av.nota)}${'☆'.repeat(5 - av.nota)}</div>
      ${av.comentario ? `<div class="av-texto">"${av.comentario}"</div>` : ''}
    </div>
  `).join('');
}

function verMaisAvaliacoes() {
  exibindo += 5;
  renderAvaliacoes();
  if (exibindo >= todasAvaliacoes.length) {
    document.getElementById('btn-ver-mais').style.display = 'none';
  }
}

// Chame no momento em que já tiver o slug do prestador disponível.
// Ex: dentro do init() da página pública, após carregar o perfil:
//   carregarAvaliacoes(prestadorSlug);
</script>
