<!-- KPIs (MOBILE: scroll horizontal) -->
<div class="kpi-grid grid grid-cols-4 gap-4 mb-6 overflow-x-auto">
  <!-- KPI 1 -->
  <div class="relative bg-[var(--color-panel-bg3)] border border-[var(--color-panel-border)] rounded-[14px] p-4 overflow-hidden kpi-card">
    <div class="text-[10px] font-bold tracking-wider uppercase text-[var(--color-panel-faint)] mb-2">Agendamentos</div>
    <div class="font-fraunces text-[24px] font-light mb-1 text-[var(--color-lime-d)]" id="kpi-agendamentos">—</div>
  </div>

  <!-- KPI 2 -->
  <div class="relative bg-[var(--color-panel-bg3)] border border-[var(--color-panel-border)] rounded-[14px] p-4 overflow-hidden kpi-card teal">
    <div class="text-[10px] font-bold tracking-wider uppercase text-[var(--color-panel-faint)] mb-2">Receita hoje</div>
    <div class="font-fraunces text-[24px] font-light mb-1 text-[rgb(93,202,165)]" id="kpi-receita">—</div>
  </div>

  <!-- KPI 3 -->
  <div class="relative bg-[var(--color-panel-bg3)] border border-[var(--color-panel-border)] rounded-[14px] p-4 overflow-hidden kpi-card amber">
    <div class="text-[10px] font-bold tracking-wider uppercase text-[var(--color-panel-faint)] mb-2">Próximo horário</div>
    <div class="font-fraunces text-[20px] font-light mb-1 text-[rgb(239,159,39)]" id="kpi-proximo">—</div>
  </div>

  <!-- KPI 4 -->
  <div class="relative bg-[var(--color-panel-bg3)] border border-[var(--color-panel-border)] rounded-[14px] p-4 overflow-hidden kpi-card rust">
    <div class="text-[10px] font-bold tracking-wider uppercase text-[var(--color-panel-faint)] mb-2">Ocupação</div>
    <div class="font-fraunces text-[24px] font-light mb-1 text-[var(--color-rust)]" id="kpi-ocupacao">—%</div>
  </div>
</div>
